name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.23"

      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Auto-merge Homebrew tap PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          # Find the PR goreleaser just created
          PR_URL=$(gh pr list --repo golf-mcp/homebrew-tap --author "github-actions[bot]" --search "golf-scanner" --json url --jq '.[0].url' 2>/dev/null || true)
          if [[ -n "$PR_URL" ]]; then
            echo "Found Homebrew tap PR: $PR_URL"
            gh pr merge "$PR_URL" --repo golf-mcp/homebrew-tap --merge --auto
          else
            echo "No Homebrew tap PR found — may have been pushed directly"
          fi
