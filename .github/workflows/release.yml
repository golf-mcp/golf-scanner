name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.24"

      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Create and merge Homebrew tap PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          BRANCH="goreleaser/golf-scanner-${VERSION}"
          PR_URL=$(gh pr create --repo golf-mcp/homebrew-tap \
            --base main --head "${BRANCH}" \
            --title "chore: update golf-scanner to ${TAG}" \
            --body "Automated update from GoReleaser release workflow.")
          echo "Created Homebrew tap PR: $PR_URL"
          gh pr merge "$PR_URL" --repo golf-mcp/homebrew-tap --merge --admin
