version: 2

builds:
  - main: ./cmd/golf-scanner
    binary: golf-scanner
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - binaries:
      - golf-scanner
    repository:
      owner: golf-mcp
      name: homebrew-tap
      branch: "goreleaser/{{.ProjectName}}-{{.Version}}"
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    homepage: "https://github.com/golf-mcp/golf-scanner"
    description: "Security scanner for MCP servers"
    license: "Apache-2.0"
